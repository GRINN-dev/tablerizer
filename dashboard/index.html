<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tablerizer Inspect</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #0f1117; color: #e1e4e8; line-height: 1.5; }
      a { color: #58a6ff; text-decoration: none; }
      a:hover { text-decoration: underline; }
      .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
      .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 0; }
      .header h1 { font-size: 20px; font-weight: 600; }
      .header h1 span { color: #8b949e; font-weight: 400; }
      .breadcrumbs { padding: 12px 0; font-size: 14px; color: #8b949e; }
      .breadcrumbs a { color: #58a6ff; }
      .breadcrumbs span { margin: 0 8px; }
      .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin: 16px 0; }
      .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; transition: border-color 0.15s; }
      .card:hover { border-color: #58a6ff; }
      .card h3 { font-size: 16px; margin-bottom: 12px; }
      .card .stats { display: flex; flex-wrap: wrap; gap: 12px; }
      .stat { font-size: 13px; }
      .stat .value { font-size: 20px; font-weight: 600; display: block; color: #58a6ff; }
      .stat .label { color: #8b949e; }
      .table-wrap { overflow-x: auto; margin: 16px 0; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #21262d; }
      th { color: #8b949e; font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
      tr:hover td { background: #161b22; }
      .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
      .badge-green { background: #0d441b; color: #3fb950; }
      .badge-gray { background: #21262d; color: #8b949e; }
      .badge-blue { background: #0c2d6b; color: #58a6ff; }
      .tree { list-style: none; padding-left: 0; }
      .tree ul { list-style: none; padding-left: 24px; border-left: 1px solid #30363d; margin-left: 8px; }
      .tree li { padding: 4px 0; }
      .tree-toggle { cursor: pointer; user-select: none; }
      .tree-toggle:hover { color: #58a6ff; }
      .tree-label { margin-left: 4px; }
      .tree-arrow { display: inline-block; width: 16px; text-align: center; color: #8b949e; font-size: 12px; }
      .section-title { font-size: 14px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin: 24px 0 8px; }
      .code-block { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 16px; font-family: "SFMono-Regular", Consolas, monospace; font-size: 13px; overflow-x: auto; white-space: pre; }
      .loading { color: #8b949e; padding: 32px; text-align: center; }
      .error { color: #f85149; padding: 16px; background: #2d1114; border: 1px solid #f85149; border-radius: 6px; margin: 16px 0; }
      .tab-bar { display: flex; gap: 0; border-bottom: 1px solid #30363d; margin-bottom: 16px; }
      .tab { padding: 8px 16px; font-size: 14px; color: #8b949e; cursor: pointer; border-bottom: 2px solid transparent; }
      .tab:hover { color: #e1e4e8; }
      .tab-active { color: #e1e4e8; border-bottom-color: #f78166; }
      .graph-container { overflow: auto; margin: 16px 0; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
      .dependency-graph { display: block; margin: 0 auto; }
      .graph-node { cursor: pointer; transition: opacity 0.15s; }
      .graph-node:hover { opacity: 0.85; }
      .graph-node-label { pointer-events: none; }
      .graph-edge { transition: stroke 0.15s; }
      .graph-legend { display: flex; align-items: center; gap: 4px; font-size: 13px; color: #8b949e; margin: 12px 0; flex-wrap: wrap; }
      .graph-search { width: 280px; padding: 8px 12px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; color: #e1e4e8; font-size: 14px; outline: none; }
      .graph-search:focus { border-color: #58a6ff; }
      .graph-search::placeholder { color: #484f58; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
