name: Test & Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests (no DB needed) ──────────────────────────────
  unit:
    name: Unit tests · Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: CLI smoke test
        run: |
          node bin/tablerizer.js --version
          node bin/tablerizer.js --help

      - name: Library import test
        run: |
          node -e "
          (async () => {
            const { Tablerizer, exportTables } = await import('./lib/index.js');
            console.log('Library imports OK');
          })();
          "

      - name: Unit tests (generators)
        run: node --import tsx --test --test-timeout=10000 test/generators.test.ts

  # ── Integration tests (real PostgreSQL) ────────────────────
  integration:
    name: Integration tests · Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15

    env:
      ROOT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DATABASE_NAME: tablerizer_test
      DATABASE_OWNER: tablerizer_owner
      DATABASE_OWNER_PASSWORD: test_owner_pass
      DATABASE_AUTHENTICATOR: tablerizer_authenticator
      DATABASE_AUTHENTICATOR_PASSWORD: test_auth_pass
      DATABASE_VISITOR: tablerizer_visitor

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Integration tests
        run: node --import tsx --test --test-timeout=30000 test/integration.test.ts

  # ── Lint / type-check ──────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm pack --dry-run
