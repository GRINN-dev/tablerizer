services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ROOT_DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/postgres"
      DATABASE_NAME: tablerizer_test
      DATABASE_OWNER: tablerizer_owner
      DATABASE_OWNER_PASSWORD: test_owner_pass
      DATABASE_AUTHENTICATOR: tablerizer_authenticator
      DATABASE_AUTHENTICATOR_PASSWORD: test_auth_pass
      DATABASE_VISITOR: tablerizer_visitor
    volumes:
      - ./test-output:/app/test-output
